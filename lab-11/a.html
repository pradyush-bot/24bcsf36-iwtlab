<html>
<head>
<title>q3</title>
<script language=JavaScript>
var sum=0,rem;
var num=parseInt(prompt("Enter a number"));

var temp=num;
while(num>0)
{
rem=num%10;
sum=(10*sum)+rem;
num=Math.floor(num/10);
}
document.write("Reverse of this number is "+sum+"<br>");
if(sum==temp)
document.write("The number is a palindrome number");
else
document.write("The number is not a palindrome number");
</script>

<html>
<head>
<title>Second Largest</title>
<script>
var arr = [10,66,21,19,56];
var lar, seclar;
if (arr[0] > arr[1]) {
lar = arr[0];
seclar = arr[1];
} else {
lar = arr[1];
seclar = arr[0];
}
for (var i = 2; i < arr.length; i++) {
if (arr[i] > lar) {
seclar = lar;
lar = arr[i];
} else if (arr[i] > seclar && arr[i] != lar) {
seclar = arr[i];
}
}
document.write("Second largest element is " + seclar + "<br>");
</script>
</head>

<html>
<head>
<title>Count Frequency</title>
<script>
var arr = [10,66,21,19,56,21,66,10,10];
var freq = {};
for (var i = 0; i < arr.length; i++) {
var num = arr[i];
if (freq[num]) {
freq[num]++;
} else {
freq[num] = 1;
}
}
for (var key in freq) {
document.write(key + " occurs " + freq[key] + " times<br>");
}
</script>
</head>
<body bgcolor="pink" text="blue">
</body>

<html>
<head>
<title>Prime</title>
<script>
let n=parseInt(prompt("Enter the number"));
function prime(n) {
var i = 1, c = 0;
while (i <= n) {
if (n % i == 0)
c++;
i++;
}
if (c == 2)
return true;
else
return false;
}
if (prime(n))
document.write(n + " is prime");
else
document.write(n + " is not prime");
</script>
</head>

</body>

<html>
<head>
<title>Armstrong Number</title>
<script>
function isArmstrong(num) {
let str = num.toString();
let power = str.length;
let sum = 0;
for (let i=0;i<str.length;i++) {
sum += Math.pow(parseInt(str[i]), power);
}
return sum === num;
}
let no=parseInt(prompt("Enter the number"));
document.write(n + (isArmstrong(no) ? " is an Armstrong number" : " is not an Armstrong number"));
</script>
</head>
<body bgcolor="lightyellow" text="darkblue">
</body>
</html>

<html>
<head>
<title>Reversing an array</title>
<script>
let arr=[10,30,23,45,67,88,22];
function reverseArray(arr) {
let rev=[];
for (let i=arr.length-1;i>=0;i--) {
rev.push(arr[i]);
}
return rev;
}
let res=reverseArray(a);
document.write("Original array: " + a + "<br>");
document.write("Reversed array: " + res+ "<br>");
</script>
</head>
