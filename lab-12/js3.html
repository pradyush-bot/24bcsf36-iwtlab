<html>
<head>
<title>Currency Converter</title>
<style>
body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background-color: #f8f9fa;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}
.card {
background: #ffffff;
padding: 25px;
border-radius: 12px;
box-shadow: 0 10px 25px rgba(0,0,0,0.05);
width: 350px;
}
h2 {
text-align: center;
font-size: 1.6rem;
margin-top: 0;
margin-bottom: 20px;
}
.form-group {
margin-bottom: 15px;
}
label {
display: block;
font-size: 0.85rem;
color: #555;
margin-bottom: 5px;
}
select, input {
width: 100%;
padding: 12px;
border: 1px solid #ddd;
border-radius: 6px;
font-size: 1rem;
box-sizing: border-box; /* Fixes padding issues */
}
input:focus, select:focus {
outline: 2px solid #000;
border-color: transparent;
}
#result {
background-color: #fff;
color: #333;
}
#error-message {
color: #d93025;
font-size: 0.85rem;
margin-top: -10px;
margin-bottom: 10px;
height: 1.2rem; /* Reserves space */
}
button {
width: 100%;
padding: 14px;
background-color: #000;
color: white;
border: none;
border-radius: 6px;
font-size: 1rem;
cursor: pointer;
transition: background 0.2s;
}
button:hover {
background-color: #333;
}
</style>
</head>
<body>
<div class="card">
<h2>Currency Converter</h2>
<div class="form-group">
<label>From:</label>
<select id="fromCurrency">
<option value="USD">USD</option>
<option value="EUR">EUR</option>
<option value="GBP">GBP</option>
<option value="INR">INR</option>
<option value="AUD">AUD</option>
</select>
</div>
<div class="form-group">
<input type="number" id="amount" placeholder="Enter amount" value="1000">
</div>
<div class="form-group">
<label>To:</label>
<select id="toCurrency">
<option value="USD">USD</option>
<option value="EUR">EUR</option>
<option value="GBP">GBP</option>
<option value="INR" selected>INR</option>
<option value="AUD">AUD</option>
</select>
</div>
<div class="form-group">
<input type="text" id="result" placeholder="Converted amount" readonly>
</div>
<div id="error-message"></div>
<button onclick="convertCurrency()">Convert</button>
</div>
<script>
const conversionRates = {
USD: { EUR: 0.93, GBP: 0.82, INR: 82.74, AUD: 1.47 },
EUR: { USD: 1.08, GBP: 0.88, INR: 89.06, AUD: 1.58 },
GBP: { USD: 1.22, EUR: 1.14, INR: 101.5, AUD: 1.80 },
INR: { USD: 0.012, EUR: 0.011, GBP: 0.0098, AUD: 0.018 },
AUD: { USD: 0.68, EUR: 0.63, GBP: 0.55, INR: 55.87 }
};
function convertCurrency() {
const from = document.getElementById('fromCurrency').value;
const to = document.getElementById('toCurrency').value;
const amount = document.getElementById('amount').value;
const resultField = document.getElementById('result');
const errorDiv = document.getElementById('error-message');
errorDiv.innerText = "";
resultField.value = "";
if (amount === "") {
errorDiv.innerText = "Please enter an amount.";
return;
}
if (from === to) {
errorDiv.innerText = "From and To currencies must be different.";
return;
}
const rate = conversionRates[from][to];
const convertedValue = amount * rate;
resultField.value = convertedValue.toFixed(2);
}
</script>
</body>
</html>
